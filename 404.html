<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex">
    <title>404 · Page Not Found · SALON POKE</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230a0a0a'/%3E%3Ctext x='50' y='68' font-family='Arial Black,sans-serif' font-size='52' font-weight='900' text-anchor='middle' fill='%23ffd700'%3ESP%3C/text%3E%3C/svg%3E">
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:#0a0a0a;color:#f5f5f5;font-family:Inter,system-ui,-apple-system,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center}
        .wrap{max-width:560px}
        .badge{display:inline-block;padding:6px 14px;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:99px;font-size:11px;letter-spacing:2px;color:#ffd700;font-weight:700;margin-bottom:24px}
        h1{font-family:'Bebas Neue',sans-serif;font-size:120px;color:#ffd700;line-height:1;letter-spacing:2px;margin-bottom:8px}
        h2{font-size:24px;color:#f5f5f5;margin-bottom:14px;font-weight:700}
        p{color:#a0a0a0;font-size:15px;line-height:1.6;margin-bottom:32px}
        .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
        a.btn{display:inline-block;padding:14px 28px;border-radius:99px;text-decoration:none;font-weight:600;font-size:14px;letter-spacing:.3px;transition:all .2s}
        a.primary{background:linear-gradient(135deg,#ffd700,#ffb700);color:#0a0a0a}
        a.primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(255,215,0,.3)}
        a.ghost{background:transparent;color:#f5f5f5;border:1px solid rgba(255,255,255,.2)}
        a.ghost:hover{border-color:#ffd700;color:#ffd700}
        .pack{display:inline-block;margin:24px 0 0;font-family:'Courier New',monospace;background:rgba(255,215,0,.05);border:1px solid rgba(255,215,0,.2);border-radius:8px;padding:10px 18px;color:#ffd700;font-size:13px}
    </style>
</head>
<body>
    <div class="wrap">
        <div class="badge">404 · PACK NOT FOUND</div>
        <h1>404</h1>
        <h2>That pack's been opened already.</h2>
        <p>The page you're looking for has wandered off — maybe it's a chase card in someone else's binder. Head back to the homepage to keep opening packs with us.</p>
        <div class="btns">
            <a href="/" class="btn primary">Back to Salon Poke</a>
            <a href="/#book" class="btn ghost">Book a Seat</a>
        </div>
        <div class="pack">🎴 Bristol UK · 60A Park Row BS1 5LE</div>
    </div>
</body>
</html>
